<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlcoolTest Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="party-bg theme-party">
  <div id="admin-login" class="container small-container">
    <div class="card glass">
      <h1>🔐 Admin AlcoolTest</h1>
      <p>Introduce parola de admin</p>
      <input id="adminPassword" type="password" placeholder="Parolă admin">
      <button id="loginBtn">Intră</button>
      <p id="loginMessage" class="muted"></p>
    </div>
  </div>

  <div id="admin-app" class="container hidden">
    <div class="top-bar">
      <h1>🍻 Admin AlcoolTest</h1>
      <button id="logoutBtn" class="secondary-btn">Ieșire</button>
    </div>

    <div class="card glass">
      <h2>Creează eveniment</h2>

      <input id="eventName" placeholder="Nume eveniment">

      <select id="eventTheme">
        <option value="party">Party</option>
        <option value="wedding">Nuntă</option>
        <option value="baptism">Botez</option>
        <option value="birthday">Majorat / aniversare</option>
      </select>

      <button id="createEventBtn">Creează eveniment</button>
      <p id="createMessage" class="muted"></p>
    </div>

    <div class="grid-2">
      <div class="card glass">
        <h2>Evenimente active</h2>
        <div id="activeEventsList" class="event-list"></div>

        <h2 style="margin-top: 24px;">Evenimente finalizate</h2>
        <div id="finishedEventsList" class="event-list"></div>
      </div>

      <div class="card glass">
        <h2>Detalii eveniment</h2>

        <p><strong>Nume:</strong> <span id="selectedEventName">-</span></p>
        <p><strong>Cod:</strong> <span id="selectedEventCode">-</span></p>
        <p><strong>Status:</strong> <span id="selectedEventStatus">-</span></p>

        <p><strong>Link guest:</strong></p>
        <div id="eventLinkBox" class="link-box">-</div>

        <div class="button-row">
          <button id="copyLinkBtn">Copiază link</button>
          <button id="shareWhatsappBtn">Trimite pe WhatsApp</button>
        </div>

        <div class="button-row">
          <button id="exportPdfBtn">Export PDF raport</button>
          <button id="toggleEventStatusBtn" class="secondary-btn">Finalizează evenimentul</button>
        </div>

        <div class="edit-event-box">
          <h3>Editează evenimentul</h3>
          <input id="editEventName" placeholder="Nume nou eveniment">
          <select id="editEventTheme">
            <option value="party">Party</option>
            <option value="wedding">Nuntă</option>
            <option value="baptism">Botez</option>
            <option value="birthday">Majorat / aniversare</option>
          </select>
          <button id="saveEventChangesBtn">Salvează modificările</button>
        </div>

        <div class="button-row">
          <button id="resetBtn" class="danger">Resetează clasamentul</button>
        </div>

        <div class="qr-wrap">
          <div id="qrcode"></div>
        </div>
      </div>
    </div>

    <div class="card glass">
      <h2>🏆 Podium</h2>
      <div id="adminPodium" class="podium">
        <div class="podium-empty">Selectează un eveniment</div>
      </div>
    </div>

    <div class="card glass">
      <h2>Restul participanților</h2>
      <ul id="adminRestList" class="ranking-list"></ul>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
